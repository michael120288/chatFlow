<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Code and Test — a full-stack QA practice platform with 46 interactive Playwright scenarios, real-time chat, and the Test Quest learning game." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://codeandtest.com/" />
    <meta property="og:title" content="Code and Test — QA Practice & Playwright Learning Platform" />
    <meta property="og:description" content="Real-time chat, social feeds, and 35+ interactive QA practice scenarios for learning Playwright testing." />
    <meta property="og:image" content="https://codeandtest.com/logo512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Code and Test — QA Practice & Playwright Learning Platform" />
    <meta name="twitter:description" content="Real-time chat, social feeds, and 35+ interactive QA practice scenarios for learning Playwright testing." />
    <meta name="twitter:image" content="https://codeandtest.com/logo512.png" />

    <!-- Fonts: preconnect first, then load (non-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Static JSON-LD: site identity (no React dependency) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://codeandtest.com/#website",
          "url": "https://codeandtest.com/",
          "name": "Code and Test",
          "description": "A full-stack social platform with real-time chat, QA practice tools, and interactive Test Quest game levels.",
          "inLanguage": "en"
        },
        {
          "@type": "WebApplication",
          "@id": "https://codeandtest.com/#app",
          "name": "Code and Test",
          "url": "https://codeandtest.com/",
          "applicationCategory": "SocialNetworkingApplication",
          "description": "Real-time social platform featuring chat, post feeds, QA practice scenarios, and the Test Quest Playwright learning game.",
          "operatingSystem": "Any",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          }
        }
      ]
    }
    </script>

    <title>Code and Test — QA Practice & Playwright Learning Platform</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
