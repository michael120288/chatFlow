<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Chat bubble background -->
  <rect x="10" y="15" width="60" height="50" rx="8" fill="#667eea" opacity="0.9"/>
  <polygon points="30,65 25,75 38,65" fill="#667eea" opacity="0.9"/>

  <!-- Second chat bubble -->
  <rect x="30" y="30" width="60" height="50" rx="8" fill="#764ba2" opacity="0.8"/>
  <polygon points="70,80 75,90 62,80" fill="#764ba2" opacity="0.8"/>

  <!-- Chat dots in first bubble -->
  <circle cx="30" cy="35" r="3" fill="white"/>
  <circle cx="40" cy="35" r="3" fill="white"/>
  <circle cx="50" cy="35" r="3" fill="white"/>

  <!-- Chat dots in second bubble -->
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.9"/>
  <circle cx="60" cy="50" r="3" fill="white" opacity="0.9"/>
  <circle cx="70" cy="50" r="3" fill="white" opacity="0.9"/>
</svg>
