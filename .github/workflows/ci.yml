name: CI

on:
  pull_request:
    branches: [develop, master]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,scss,css}"

      - name: ESLint
        run: npx eslint src --ext .js,.jsx,.ts,.tsx --max-warnings 0

      - name: Unit tests
        run: npm test -- --watchAll=false --ci --passWithNoTests

      - name: Build
        run: npm run build
        env:
          CI: false
